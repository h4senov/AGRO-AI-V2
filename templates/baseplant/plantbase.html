{% extends "base.html" %}

{% block title %}Bitkilərin Siyahısı{% endblock %}

{% block content %}
<h2>Bitkilər</h2>
<div class="card-grid">
  {% for plant in plants %}
    <div class="card">
      <img src="{{ plant.main_image.image_url if plant.main_image else url_for('static', filename='default_plant.jpg') }}" alt="{{ plant.name }}">
      <div class="card-body">
        <h3>{{ plant.name }}</h3>
        <p><em>{{ plant.scientific_name }}</em></p>
        <p>{{ plant.family }}</p>
        <a href="{{ url_for('single_plant_detail', plant_id=plant.id) }}" class="btn">Ətraflı</a>
      </div>
    </div>
  {% else %}
    <p>Heç bir bitki tapılmadı.</p>
  {% endfor %}
</div>
{% endblock %}
