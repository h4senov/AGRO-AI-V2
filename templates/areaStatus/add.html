{% extends "base.html" %}
{% block title %}Yeni Status Əlavə Et{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/status.css') }}">
{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2 class="form-title">➕ Yeni Status Əlavə Et</h2>

    <form method="POST" class="custom-form">
        ...
    </form>
</div>
 
<div class="form-wrapper">
    <h2 class="form-title">➕ Yeni Status Əlavə Et</h2>

    <form method="POST" class="custom-form">
        <div class="form-group">
            <label>Sahə</label>
            <select name="area_id" required>
                {% for area in areas %}
                <option value="{{ area.id }}">{{ area.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Mütəxəssis</label>
            <select name="specialist_id" required>
                {% for specialist in specialists %}
                <option value="{{ specialist.id }}">{{ specialist.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Yoxlama Tarixi</label>
            <input type="date" name="inspection_date" required>
        </div>

        <div class="form-group">
            <label>Qeyd</label>
            <textarea name="notes" rows="3" placeholder="Əlavə qeydlər..."></textarea>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" required>
                <option value="yaxşı">Yaxşı</option>
                <option value="orta">Orta</option>
                <option value="pis">Pis</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Əlavə Et</button>
            <a href="{{ url_for('list_status') }}" class="btn btn-secondary">← Geri</a>
        </div>
    </form>
</div>
{% endblock %}
