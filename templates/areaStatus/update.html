{% extends "base.html" %}
{% block title %}Status Yenilə{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/status.css') }}">
{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2 class="form-title">✏️ Status Yenilə</h2>

    <form method="POST" class="custom-form">
        <div class="form-group">
            <label>Sahə</label>
            <select name="area_id" required>
                {% for area in areas %}
                <option value="{{ area.id }}" {% if area.id == areaStatus.area_id %}selected{% endif %}>
                    {{ area.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Mütəxəssis</label>
            <select name="specialist_id" required>
                {% for specialist in specialists %}
                <option value="{{ specialist.id }}" {% if specialist.id == areaStatus.specialist_id %}selected{% endif %}>
                    {{ specialist.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Yoxlama Tarixi</label>
            <input type="date" name="inspection_date" value="{{ areaStatus.inspection_date }}" required>
        </div>

        <div class="form-group">
            <label>Qeyd</label>
            <textarea name="notes" rows="3" placeholder="Əlavə qeydlər...">{{ areaStatus.notes }}</textarea>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" required>
                <option value="yaxşı" {% if areaStatus.status == "yaxşı" %}selected{% endif %}>Yaxşı</option>
                <option value="orta" {% if areaStatus.status == "orta" %}selected{% endif %}>Orta</option>
                <option value="pis" {% if areaStatus.status == "pis" %}selected{% endif %}>Pis</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-warning">Yenilə</button>
            <a href="{{ url_for('list_status') }}" class="btn btn-secondary">← Geri</a>
        </div>
    </form>
</div>
{% endblock %}
